<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Adventure - What is Solar System Quiz Time</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;
      background:linear-gradient(180deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
      color:#e0e7ff;
      min-height:100vh;
      position:relative;
      overflow-x:hidden;
    }
    .stars{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20px 30px,#fff,transparent),
        radial-gradient(2px 2px at 40px 70px,#fff,transparent),
        radial-gradient(1px 1px at 90px 40px,#fff,transparent),
        radial-gradient(2px 2px at 130px 80px,#fff,transparent),
        radial-gradient(1px 1px at 160px 120px,#fff,transparent),
        radial-gradient(2px 2px at 200px 50px,#fff,transparent),
        radial-gradient(1px 1px at 250px 160px,#fff,transparent),
        radial-gradient(2px 2px at 300px 90px,#fff,transparent),
        radial-gradient(1px 1px at 350px 130px,#fff,transparent),
        radial-gradient(2px 2px at 400px 60px,#fff,transparent),
        radial-gradient(1px 1px at 450px 180px,#fff,transparent),
        radial-gradient(2px 2px at 500px 100px,#fff,transparent),
        radial-gradient(1px 1px at 550px 140px,#fff,transparent),
        radial-gradient(2px 2px at 600px 70px,#fff,transparent),
        radial-gradient(1px 1px at 650px 190px,#fff,transparent),
        radial-gradient(2px 2px at 700px 110px,#fff,transparent),
        radial-gradient(1px 1px at 750px 150px,#fff,transparent),
        radial-gradient(2px 2px at 800px 80px,#fff,transparent),
        radial-gradient(1px 1px at 850px 170px,#fff,transparent);
      background-size:900px 200px;
      animation:twinkle 4s ease-in-out infinite;
      z-index:0;
    }
    @keyframes twinkle{
      0%,100%{opacity:0.3;}
      50%{opacity:0.8;}
    }
    .container{
      max-width:640px;
      margin:auto;
      padding:32px 16px 40px;
      position:relative;
      z-index:1;
    }
    .header{
      text-align:center;
      margin-bottom:30px;
    }
    h1{
      font-size:32px;
      color:#a78bfa;
      margin-bottom:8px;
    }
    .subtitle{
      color:#c4b5fd;
      font-size:16px;
    }
    .vs-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,0.1);
      border-radius:16px;
      padding:16px;
      margin-bottom:20px;
    }
    .player-info{
      text-align:center;
      flex:1;
    }
    .player-emoji{
      font-size:48px;
    }
    .player-name{
      font-size:14px;
      margin-top:4px;
    }
    .player-score{
      font-size:24px;
      font-weight:bold;
      color:#a78bfa;
    }
    .vs-text{
      font-size:28px;
      font-weight:bold;
      color:#ff9800;
      margin:0 16px;
    }
    .quiz-card{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:20px;
      padding:24px;
      margin-bottom:16px;
      border:2px solid rgba(167,139,250,0.3);
    }
    .question{
      font-size:18px;
      font-weight:bold;
      margin-bottom:16px;
      color:#fff;
    }
    .options{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .option{
      padding:14px 18px;
      background:rgba(255,255,255,0.05);
      border:2px solid rgba(255,255,255,0.2);
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      transition:0.2s;
      text-align:center;
    }
    .option:hover{
      background:rgba(255,255,255,0.1);
      border-color:#a78bfa;
    }
    .option.correct{
      background:rgba(76,175,80,0.3);
      border-color:#4caf50;
    }
    .option.wrong{
      background:rgba(244,67,54,0.3);
      border-color:#f44336;
    }
    .matching-game{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .match-item{
      padding:14px;
      background:rgba(255,255,255,0.05);
      border:2px solid rgba(255,255,255,0.2);
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      text-align:center;
      transition:0.2s;
    }
    .match-item:hover{
      background:rgba(255,255,255,0.1);
    }
    .match-item.selected{
      border-color:#a78bfa;
      background:rgba(167,139,250,0.2);
    }
    .match-item.matched{
      background:rgba(76,175,80,0.3);
      border-color:#4caf50;
      opacity:0.5;
      pointer-events:none;
    }
    .drag-drop-area{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .draggable{
      padding:12px;
      background:rgba(255,152,0,0.2);
      border:2px solid #ff9800;
      border-radius:10px;
      cursor:grab;
      text-align:center;
      font-size:14px;
    }
    .drop-zone{
      padding:16px;
      background:rgba(255,255,255,0.05);
      border:2px dashed rgba(255,255,255,0.3);
      border-radius:12px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .drop-zone.drag-over{
      border-color:#a78bfa;
      background:rgba(167,139,250,0.1);
    }
    .feedback{
      margin-top:12px;
      padding:12px;
      border-radius:10px;
      font-size:15px;
      display:none;
    }
    .feedback.show{
      display:block;
    }
    .feedback.correct{
      background:rgba(76,175,80,0.2);
      color:#81c784;
    }
    .feedback.wrong{
      background:rgba(244,67,54,0.2);
      color:#e57373;
    }
    .podium{
      display:none;
      background:linear-gradient(135deg,#a78bfa,#7c3aed);
      border-radius:20px;
      padding:24px;
      margin-top:20px;
    }
    .podium.show{
      display:block;
    }
    .podium h2{
      text-align:center;
      color:#e0e7ff;
      font-size:24px;
      margin-bottom:20px;
    }
    .podium-stand{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:12px;
      height:150px;
    }
    .stand{
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .stand-emoji{
      font-size:48px;
      margin-bottom:8px;
    }
    .stand-name{
      font-size:12px;
      color:#e0e7ff;
      margin-bottom:4px;
    }
    .stand-bar{
      background:linear-gradient(180deg,#ffd700,#ff9800);
      border-radius:8px 8px 0 0;
      width:60px;
    }
    .stand-bar.silver{
      background:linear-gradient(180deg,#c0c0c0,#a0a0a0);
    }
    .stand-bar.bronze{
      background:linear-gradient(180deg,#cd7f32,#a0522d);
    }
    .next-btn{
      width:100%;
      padding:16px;
      background:linear-gradient(135deg,#ff9800,#f57c00);
      border:none;
      border-radius:12px;
      color:#0f0c29;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:transform 0.2s;
      margin-top:16px;
    }
    .next-btn:hover{
      transform:scale(1.02);
    }
    .nav-hint{
      margin-top:20px;
      text-align:center;
      font-size:13px;
      color:#a78bfa;
      background:rgba(167,139,250,0.1);
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>
<body>
<div class="stars"></div>
<div class="container">
  <div class="header">
    <h1>❓ Quiz Time!</h1>
    <div class="subtitle">Compete against Prof. Cosmos!</div>
  </div>

  <div class="vs-bar">
    <div class="player-info">
      <div class="player-emoji" id="playerEmoji">🧭</div>
      <div class="player-name" id="playerName">You</div>
      <div class="player-score" id="playerScore">0</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="player-info">
      <div class="player-emoji">🔭</div>
      <div class="player-name">Prof. Cosmos</div>
      <div class="player-score" id="profScore">0</div>
    </div>
  </div>

  <div class="quiz-card" id="quizContainer">
    <div class="question" id="question">Loading question...</div>
    <div id="quizContent"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="podium" id="podium">
    <h2>🏆 Quiz Complete!</h2>
    <div class="podium-stand">
      <div class="stand">
        <div class="stand-emoji">🥉</div>
        <div class="stand-name" id="thirdName">-</div>
        <div class="stand-bar bronze" style="height:60px;"></div>
      </div>
      <div class="stand">
        <div class="stand-emoji">🥇</div>
        <div class="stand-name" id="firstName">-</div>
        <div class="stand-bar" style="height:100px;"></div>
      </div>
      <div class="stand">
        <div class="stand-emoji">🥈</div>
        <div class="stand-name" id="secondName">-</div>
        <div class="stand-bar silver" style="height:80px;"></div>
      </div>
    </div>
    <button class="next-btn" onclick="nextChapter()">Next Chapter →</button>
  </div>

<div class="nav-hint">
  <div>💡 Answer the quiz questions to compete against Prof. Cosmos!</div>
  <div>💡 Use the 🏠 button in the top navigation bar to go back to the Home page.</div>
</div>

</div>

<script>
const playerName = localStorage.getItem('solarPlayerName') || 'Explorer';
const playerCharacter = localStorage.getItem('solarPlayerCharacter') || 'explorer';
const characterEmojis = {
  'explorer': '🧭',
  'astronaut': '👨‍🚀',
  'scientist': '🔬',
  'pilot': '✈️',
  'engineer': '🔧',
  'captain': '⚓'
};

document.getElementById('playerEmoji').textContent = characterEmojis[playerCharacter];
document.getElementById('playerName').textContent = playerName;

let playerScore = 0;
let profScore = 0;
let currentQuestion = 0;
let selectedMatch = null;

const quizTypes = ['multiple-choice', 'matching', 'drag-drop'];
const questions = [
  {
    type: 'multiple-choice',
    question: 'What is at the center of our solar system?',
    options: ['The Sun', 'Earth', 'The Moon', 'Jupiter'],
    correct: 0
  },
  {
    type: 'matching',
    question: 'Match the planet to its description:',
    pairs: [
      {left: 'Mercury', right: 'Smallest planet'},
      {left: 'Venus', right: 'Hottest planet'},
      {left: 'Jupiter', right: 'Biggest planet'},
      {left: 'Saturn', right: 'Has rings'}
    ]
  },
  {
    type: 'drag-drop',
    question: 'Drag the correct description to each planet:',
    items: [
      {planet: 'Earth', desc: 'Our home', correct: true},
      {planet: 'Mars', desc: 'Red planet', correct: true}
    ]
  },
  {
    type: 'multiple-choice',
    question: 'How many planets are in our solar system?',
    options: ['7', '8', '9', '10'],
    correct: 1
  },
  {
    type: 'multiple-choice',
    question: 'What do planets do around the Sun?',
    options: ['Float', 'Orbit', 'Spin', 'Jump'],
    correct: 1
  }
];

function loadQuestion() {
  if (currentQuestion >= questions.length) {
    showPodium();
    return;
  }

  const q = questions[currentQuestion];
  document.getElementById('question').textContent = q.question;
  const content = document.getElementById('quizContent');
  content.innerHTML = '';

  if (q.type === 'multiple-choice') {
    content.innerHTML = '<div class="options"></div>';
    const optionsDiv = content.querySelector('.options');
    q.options.forEach((opt, i) => {
      const btn = document.createElement('div');
      btn.className = 'option';
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(i, q.correct);
      optionsDiv.appendChild(btn);
    });
  } else if (q.type === 'matching') {
    content.innerHTML = '<div class="matching-game"></div>';
    const gameDiv = content.querySelector('.matching-game');
    const items = [];
    q.pairs.forEach((pair, i) => {
      const leftBtn = document.createElement('div');
      leftBtn.className = 'match-item';
      leftBtn.textContent = pair.left;
      leftBtn.dataset.type = 'left';
      leftBtn.dataset.index = i;
      leftBtn.onclick = () => selectMatch(leftBtn, i, 'left');
      
      const rightBtn = document.createElement('div');
      rightBtn.className = 'match-item';
      rightBtn.textContent = pair.right;
      rightBtn.dataset.type = 'right';
      rightBtn.dataset.index = i;
      rightBtn.onclick = () => selectMatch(rightBtn, i, 'right');
      
      items.push(leftBtn, rightBtn);
    });
    items.sort(() => Math.random() - 0.5);
    items.forEach(item => gameDiv.appendChild(item));
  } else if (q.type === 'drag-drop') {
    content.innerHTML = '<div class="drag-drop-area"></div>';
    const area = content.querySelector('.drag-drop-area');
    q.items.forEach((item, i) => {
      const dropZone = document.createElement('div');
      dropZone.className = 'drop-zone';
      dropZone.textContent = item.planet;
      dropZone.dataset.index = i;
      
      const draggable = document.createElement('div');
      draggable.className = 'draggable';
      draggable.textContent = item.desc;
      draggable.draggable = true;
      draggable.ondragstart = (e) => e.dataTransfer.setData('text', i);
      draggable.ondragend = () => dropZone.classList.remove('drag-over');
      
      dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      };
      dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
      dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        checkDragDrop(i, item.correct);
      };
      
      area.appendChild(dropZone);
      area.appendChild(draggable);
    });
  }
}

function checkAnswer(selected, correct) {
  const feedback = document.getElementById('feedback');
  const options = document.querySelectorAll('.option');
  
  options.forEach(opt => opt.style.pointerEvents = 'none');
  
  if (selected === correct) {
    options[selected].classList.add('correct');
    feedback.textContent = '✅ Correct! Great job!';
    feedback.className = 'feedback show correct';
    playerScore++;
  } else {
    options[selected].classList.add('wrong');
    options[correct].classList.add('correct');
    feedback.textContent = '❌ Not quite. Prof. Cosmos gets this one!';
    feedback.className = 'feedback show wrong';
    profScore++;
  }
  
  updateScores();
  setTimeout(() => {
    currentQuestion++;
    feedback.classList.remove('show');
    loadQuestion();
  }, 1500);
}

function selectMatch(element, index, type) {
  if (element.classList.contains('matched')) return;
  
  if (selectedMatch === null) {
    selectedMatch = {element, index, type};
    element.classList.add('selected');
  } else {
    if (selectedMatch.type !== type && selectedMatch.index === index) {
      selectedMatch.element.classList.add('matched');
      element.classList.add('matched');
      selectedMatch.element.classList.remove('selected');
      playerScore++;
      updateScores();
      
      const feedback = document.getElementById('feedback');
      feedback.textContent = '✅ Match found!';
      feedback.className = 'feedback show correct';
      setTimeout(() => {
        feedback.classList.remove('show');
      }, 1000);
    } else {
      selectedMatch.element.classList.remove('selected');
    }
    selectedMatch = null;
    
    if (document.querySelectorAll('.match-item.matched').length === questions[currentQuestion].pairs.length * 2) {
      setTimeout(() => {
        currentQuestion++;
        loadQuestion();
      }, 1000);
    }
  }
}

function checkDragDrop(index, correct) {
  const feedback = document.getElementById('feedback');
  
  if (correct) {
    feedback.textContent = '✅ Correct!';
    feedback.className = 'feedback show correct';
    playerScore++;
  } else {
    feedback.textContent = '❌ Wrong! Prof. Cosmos gets this one!';
    feedback.className = 'feedback show wrong';
    profScore++;
  }
  
  updateScores();
  setTimeout(() => {
    currentQuestion++;
    feedback.classList.remove('show');
    loadQuestion();
  }, 1500);
}

function updateScores() {
  document.getElementById('playerScore').textContent = playerScore;
  document.getElementById('profScore').textContent = profScore;
}

function showPodium() {
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('podium').classList.add('show');
  
  const scores = [
    {name: playerName, score: playerScore},
    {name: 'Prof. Cosmos', score: profScore},
    {name: 'Random Astronaut', score: Math.floor(Math.random() * 3)}
  ];
  
  scores.sort((a, b) => b.score - a.score);
  
  document.getElementById('firstName').textContent = scores[0].name;
  document.getElementById('secondName').textContent = scores[1].name;
  document.getElementById('thirdName').textContent = scores[2].name;
}

function nextChapter() {
  window.location.href = '007-The-Sun-Activity.html';
}

loadQuestion();
</script>
</body>
</html>
