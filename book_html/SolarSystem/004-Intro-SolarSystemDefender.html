<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Defender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', 'Comic Neue', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            margin: 0;
        }
        .game-shell {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 8px 10px 16px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            box-sizing: border-box;
        }
        .stage-wrap {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-stage {
            position: relative;
            width: min(100%, 700px, calc((100vh - 150px) * 7 / 6));
            aspect-ratio: 7 / 6;
            height: auto;
            max-height: calc(100vh - 150px);
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid rgba(255, 200, 0, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.2);
            box-sizing: border-box;
        }
        #gameCanvas {
            position: absolute;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        .ui-container {
            width: 100%;
            max-width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ui-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            font-size: 18px;
            font-weight: bold;
        }
        .ui-label {
            color: #aaa;
            font-size: 12px;
            margin-right: 8px;
        }
        .ui-value {
            color: #ffd700;
        }
        .start-screen, .game-over-screen {
            position: absolute;
            left: 10px;
            right: 10px;
            top: 10px;
            bottom: 10px;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.88);
            padding: 10px 8px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid rgba(255, 200, 0, 0.6);
            z-index: 100;
            box-sizing: border-box;
        }
        /* game-stage-overlay-v2 */
        .start-screen h1, .game-over-screen h1 {
            color: #ffd700;
            margin-bottom: 8px;
            font-size: clamp(16px, 4.5vw, 32px);
            line-height: 1.15;
            max-width: 100%;
        }
        .start-screen p, .game-over-screen p {
            color: #ccc;
            margin-bottom: 12px;
            font-size: clamp(11px, 3.2vw, 16px);
            line-height: 1.4;
            max-width: 100%;
            word-break: break-word;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff9500);
            color: white;
            font-size: clamp(14px, 3.8vw, 20px);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease;
            max-width: 100%;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .touch-controls {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .touch-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 200, 0, 0.7);
            background: rgba(255, 200, 0, 0.2);
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .touch-btn:active {
            background: rgba(255, 200, 0, 0.5);
        }
        @media (max-width: 600px) {
            .game-shell { padding: 6px 8px 12px; }
            .title { font-size: 15px !important; margin-bottom: 6px !important; line-height: 1.35; }
            .ui-container { margin-bottom: 6px; gap: 4px; }
            .ui-item { font-size: 12px; padding: 5px 8px; }
            .start-screen, .game-over-screen {
                left: 8px;
                right: 8px;
                top: 8px;
                bottom: 8px;
                padding: 8px 6px;
            }
            .start-screen h1, .game-over-screen h1 { margin-bottom: 6px; }
            .start-screen p, .game-over-screen p { margin-bottom: 10px; }
            .btn { padding: 8px 14px; }
            .touch-controls { gap: 12px; margin-top: 6px; }
            .touch-btn { width: 56px; height: 56px; font-size: 22px; }
            .game-stage { width: min(100%, calc((100vh - 130px) * 7 / 6)); max-height: calc(100vh - 130px); }
        }

<script>
(function (w) {
  var BOOK = "solarsystem";
  function key(name) {
    return "book:" + BOOK + ":" + name;
  }
  w.SolarPlayer = {
    getUserName: function () {
      return localStorage.getItem(key("userName")) || localStorage.getItem("userName") || "Explorer";
    },
    getCharacter: function () {
      return localStorage.getItem(key("userCharacter")) || localStorage.getItem("userCharacter") || "👨‍🚀";
    },
    getCharacterName: function () {
      return localStorage.getItem(key("characterName")) || localStorage.getItem("characterName") || "Astronaut";
    },
    save: function (name, character, characterName) {
      localStorage.setItem(key("userName"), name);
      localStorage.setItem(key("userCharacter"), character);
      if (characterName != null) localStorage.setItem(key("characterName"), characterName);
      localStorage.setItem("userName", name);
      localStorage.setItem("userCharacter", character);
      if (characterName != null) localStorage.setItem("characterName", characterName);
    },
  };
})(window);
</script>

    <script>
        // Game setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const sunRadius = 50;

        // Game state
        let gameRunning = false;
        let score = 0;
        let lives = 5;
        let level = 1;
        let cannonAngle = -Math.PI / 2; // Start pointing up
        let lastFireTime = 0;
        const fireInterval = 250; // ms

        // Game objects
        let bullets = [];
        let asteroids = [];
        let particles = [];
        let stars = [];

        // Input state
        let moveLeft = false;
        let moveRight = false;
        let keys = {};

        // Initialize stars for background
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.7 + 0.3
                });
            }
        }

        // Draw stars
        function drawStars() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);
            
            stars.forEach(star => {
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // Draw sun
        function drawSun() {
            // Big glow
            const glow1 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, sunRadius + 80);
            glow1.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
            glow1.addColorStop(0.5, 'rgba(255, 150, 0, 0.1)');
            glow1.addColorStop(1, 'rgba(255, 200, 0, 0)');
            ctx.fillStyle = glow1;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius + 80, 0, Math.PI * 2);
            ctx.fill();
            
            // Smaller glow
            const glow2 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, sunRadius + 40);
            glow2.addColorStop(0, 'rgba(255, 200, 0, 0.4)');
            glow2.addColorStop(1, 'rgba(255, 200, 0, 0)');
            ctx.fillStyle = glow2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius + 40, 0, Math.PI * 2);
            ctx.fill();
            
            // Sun body
            const sunGrad = ctx.createRadialGradient(centerX - 10, centerY - 10, 10, centerX, centerY, sunRadius);
            sunGrad.addColorStop(0, '#fffacd'); // Light yellow
            sunGrad.addColorStop(0.3, '#ffd700'); // Gold
            sunGrad.addColorStop(0.7, '#ffa500'); // Orange
            sunGrad.addColorStop(1, '#ff8c00'); // Dark orange
            ctx.fillStyle = sunGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // Sunspots
            ctx.fillStyle = 'rgba(139, 69, 19, 0.4)';
            ctx.beginPath();
            ctx.arc(centerX - 20, centerY - 10, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 15, centerY + 15, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 5, centerY - 20, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw cannon
        function drawCannon() {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(cannonAngle + Math.PI / 2);
            
            // Cannon barrel
            ctx.fillStyle = '#8b4513'; // Brown
            ctx.fillRect(-10, -90, 20, 70);
            
            // Cannon tip
            ctx.fillStyle = '#654321'; // Darker brown
            ctx.fillRect(-12, -95, 24, 12);
            
            // Cannon base
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // Spawn asteroid
        function spawnAsteroid() {
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.max(width, height) / 2 + 50;
            const size = 20 + Math.random() * 30;
            const speed = (1 + Math.random() * 1.5) + (level - 1) * 0.3;
            
            asteroids.push({
                x: centerX + Math.cos(angle) * distance,
                y: centerY + Math.sin(angle) * distance,
                radius: size,
                speed: speed,
                angle: angle + Math.PI // Move towards center
            });
        }

        // Fire bullet
        function fireBullet() {
            const now = Date.now();
            if (now - lastFireTime < fireInterval) return;
            lastFireTime = now;
            
            bullets.push({
                x: centerX + Math.cos(cannonAngle) * 100,
                y: centerY + Math.sin(cannonAngle) * 100,
                vx: Math.cos(cannonAngle) * 12,
                vy: Math.sin(cannonAngle) * 12,
                radius: 8
            });
        }

        // Create explosion
        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: Math.random() * 4 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // Check collisions
        function checkCollisions() {
            // Bullet vs Asteroid
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const a = asteroids[j];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < b.radius + a.radius) {
                        createExplosion(a.x, a.y, a.radius > 30 ? '#ff6600' : '#ffaa00');
                        score += Math.floor(a.radius);
                        bullets.splice(i, 1);
                        asteroids.splice(j, 1);
                        
                        // Level up check
                        if (score >= level * 200) {
                            level++;
                            document.getElementById('levelDisplay').textContent = level;
                        }
                        
                        document.getElementById('scoreDisplay').textContent = score;
                        break;
                    }
                }
            }
            
            // Asteroid vs Sun
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                const dx = a.x - centerX;
                const dy = a.y - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < a.radius + sunRadius) {
                    createExplosion(a.x, a.y, '#ff4444', 25);
                    asteroids.splice(i, 1);
                    lives--;
                    document.getElementById('livesDisplay').textContent = lives;
                    
                    if (lives <= 0) {
                        endGame();
                        return;
                    }
                }
            }
        }

        // Update game objects
        function update() {
            // Rotate cannon
            if (moveLeft || keys['ArrowLeft'] || keys['a']) cannonAngle -= 0.08;
            if (moveRight || keys['ArrowRight'] || keys['d']) cannonAngle += 0.08;
            
            // Auto fire
            fireBullet();
            
            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                // Remove off-screen
                if (b.x < -50 || b.x > width + 50 || b.y < -50 || b.y > height + 50) {
                    bullets.splice(i, 1);
                }
            }
            
            // Update asteroids
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                const dx = centerX - a.x;
                const dy = centerY - a.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                a.x += (dx / dist) * a.speed;
                a.y += (dy / dist) * a.speed;
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            checkCollisions();
        }

        // Draw everything
        function draw() {
            drawStars();
            drawSun();
            
            // Draw asteroids
            asteroids.forEach(a => {
                ctx.fillStyle = `hsl(${30 + Math.random() * 20}, 60%, 40%)`;
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Craters
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(a.x + a.radius * 0.3, a.y - a.radius * 0.2, a.radius * 0.25, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw bullets
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 20;
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            
            drawCannon();
            
            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // Game loop
        let lastSpawn = 0;
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            // Spawn asteroids
            const spawnInterval = Math.max(1400 - level * 100, 500);
            if (timestamp - lastSpawn > spawnInterval) {
                spawnAsteroid();
                lastSpawn = timestamp;
            }
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            score = 0;
            lives = 5;
            level = 1;
            cannonAngle = -Math.PI / 2;
            bullets = [];
            asteroids = [];
            particles = [];
            lastSpawn = 0;
            
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('livesDisplay').textContent = lives;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        // End game
        function endGame() {
            gameRunning = false;
            document.getElementById('finalStats').textContent = `Final Score: ${score} | Level: ${level}`;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        // Restart game
        function restartGame() {
            startGame();
        }

        // Input handling
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', e => {
            keys[e.key] = false;
        });
        
        // Touch controls
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        
        leftBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            moveLeft = true;
        });
        leftBtn.addEventListener('touchend', () => moveLeft = false);
        leftBtn.addEventListener('mousedown', () => moveLeft = true);
        leftBtn.addEventListener('mouseup', () => moveLeft = false);
        leftBtn.addEventListener('mouseleave', () => moveLeft = false);
        
        rightBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            moveRight = true;
        });
        rightBtn.addEventListener('touchend', () => moveRight = false);
        rightBtn.addEventListener('mousedown', () => moveRight = true);
        rightBtn.addEventListener('mouseup', () => moveRight = false);
        rightBtn.addEventListener('mouseleave', () => moveRight = false);

        // Keep canvas buffer at game coordinates; scale crisply to the stage box.
        const BASE_W = 700;
        const BASE_H = 600;

        function resizeCanvas() {
            const stage = document.querySelector('.game-stage');
            if (!stage) return;
            const displayW = stage.clientWidth;
            const displayH = stage.clientHeight;
            if (!displayW || !displayH) return;
            canvas.style.width = displayW + 'px';
            canvas.style.height = displayH + 'px';
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = Math.round(BASE_W * dpr);
            canvas.height = Math.round(BASE_H * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', resizeCanvas);
        const stageEl = document.querySelector('.game-stage');
        if (stageEl && typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(resizeCanvas).observe(stageEl);
        }

        // Initialize
        initStars();
        drawStars();
        drawSun();
        drawCannon();
        resizeCanvas();
    </script>
</body>
</html>
