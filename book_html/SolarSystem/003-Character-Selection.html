<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Adventure - Choose Your Explorer</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;
      background:#0f0c29;
      color:#e0e7ff;
      min-height:100vh;
      position:relative;
      overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .stars{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20px 30px,#fff,transparent),
        radial-gradient(2px 2px at 40px 70px,#fff,transparent),
        radial-gradient(1px 1px at 90px 40px,#fff,transparent),
        radial-gradient(2px 2px at 130px 80px,#fff,transparent),
        radial-gradient(1px 1px at 160px 120px,#fff,transparent),
        radial-gradient(2px 2px at 200px 50px,#fff,transparent),
        radial-gradient(1px 1px at 250px 160px,#fff,transparent),
        radial-gradient(2px 2px at 300px 90px,#fff,transparent),
        radial-gradient(1px 1px at 350px 130px,#fff,transparent),
        radial-gradient(2px 2px at 400px 60px,#fff,transparent),
        radial-gradient(1px 1px at 450px 180px,#fff,),
        radial-gradient(2px 2px at 500px 100px,#fff,transparent),
        radial-gradient(1px 1px at 550px 140px,#fff,transparent),
        radial-gradient(2px 2px at 600px 70px,#fff,transparent),
        radial-gradient(1px 1px at 650px 190px,#fff,transparent),
        radial-gradient(2px 2px at 700px 110px,#fff,transparent),
        radial-gradient(1px 1px at 750px 150px,#fff,transparent),
        radial-gradient(2px 2px at 800px 80px,#fff,transparent),
        radial-gradient(1px 1px at 850px 170px,#fff,transparent);
      background-size:900px 200px;
      animation:twinkle 4s ease-in-out infinite;
      z-index:0;
    }
    @keyframes twinkle{
      0%,100%{opacity:0.3;}
      50%{opacity:0.8;}
    }
    .container{
      max-width:640px;
      margin:auto;
      padding:16px 14px 20px;
      position:relative;
      z-index:1;
      min-height:auto;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }
    .header{
      text-align:center;
      margin-bottom:14px;
    }
    h1{
      font-size:28px;
      color:#a78bfa;
      margin-bottom:12px;
      text-shadow:0 0 20px rgba(167,139,250,0.5);
    }
    .subtitle{
      color:#c4b5fd;
      font-size:16px;
    }
 input[type="text"]{
      width:100%;
      padding:10px 12px;
      border:2px solid rgba(167,139,250,0.3);
      border-radius:16px;
      background:#1a1735;
      color:#fff;
      font-size:16px;
      font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;
      margin-bottom:14px;
      outline:none;
      transition:0.3s;
    }
    input[type="text"]:focus{
      border-color:#a78bfa;
      background:rgba(255,255,255,0.15);
    }
    input[type="text"]::placeholder{
      color:rgba(255,255,255,0.5);
    }
    .character-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-bottom:14px;
    }
    .character-option{
      background:#1a1735;
      border:4px solid transparent;
      border-radius:20px;
      padding:10px 4px;
      cursor:pointer;
      transition:0.3s;
      font-size:34px;
      text-align:center;
      backdrop-filter:blur(10px);
    }
    .character-option:hover{
      background:rgba(255,255,255,0.2);
      transform:scale(1.1);
    }
    .character-option.selected{
      border-color:#ffd700;
      background:rgba(255,215,0,0.2);
      box-shadow:0 0 30px rgba(255,215,0,0.4);
    }
    .character-name{
      font-size:14px;
      margin-top:8px;
      color:#c4b5fd;
    }
    .preview-section{
      background:#1a1735;
      backdrop-filter:blur(10px);
      border-radius:20px;
      padding:14px;
      margin-bottom:12px;
      text-align:center;
      border:2px solid rgba(255,255,255,0.1);
    }
    .preview-character{
      font-size:56px;
      margin-bottom:12px;
    }
    .preview-name{
      font-size:18px;
      color:#ffd700;
      font-weight:bold;
    }
    @media (max-width: 480px) {
      .container{padding:10px 10px 14px;}
      h1{font-size:22px;margin-bottom:6px;}
      .subtitle{font-size:14px;}
      .preview-section{padding:10px;margin-bottom:10px;}
      .preview-character{font-size:44px;margin-bottom:6px;}
      .preview-name{font-size:16px;}
      input[type="text"]{padding:8px 10px;font-size:15px;margin-bottom:10px;}
      .character-grid{gap:6px;margin-bottom:6px;}
      .character-option{padding:8px 2px;font-size:28px;border-width:2px;border-radius:12px;}
      .character-name{font-size:10px;margin-top:2px;}
    }
  </style>
<script>
(function (w) {
  var BOOK = "solarsystem";
  function key(name) {
    return "book:" + BOOK + ":" + name;
  }
  w.SolarPlayer = {
    getUserName: function () {
      return localStorage.getItem(key("userName")) || localStorage.getItem("userName") || "Explorer";
    },
    getCharacter: function () {
      return localStorage.getItem(key("userCharacter")) || localStorage.getItem("userCharacter") || "👨‍🚀";
    },
    getCharacterName: function () {
      return localStorage.getItem(key("characterName")) || localStorage.getItem("characterName") || "Astronaut";
    },
    save: function (name, character, characterName) {
      localStorage.setItem(key("userName"), name);
      localStorage.setItem(key("userCharacter"), character);
      if (characterName != null) localStorage.setItem(key("characterName"), characterName);
      localStorage.setItem("userName", name);
      localStorage.setItem("userCharacter", character);
      if (characterName != null) localStorage.setItem("characterName", characterName);
    },
  };
})(window);
</script>
</head>
<body>
<div class="stars"></div>
<div class="container">
  <div class="header">
    <h1>🚀 Choose Your Explorer!</h1>
    <div class="subtitle">Pick a character and name for your space adventure!</div>
  </div>

  <div class="preview-section">
    <div class="preview-character" id="previewCharacter">👨‍🚀</div>
    <div class="preview-name" id="previewName">Ariel</div>
  </div>

  <input type="text" id="userName" placeholder="Enter your name..." value="Ariel" oninput="updatePreview()">

  <div class="character-grid">
    <div class="character-option selected" onclick="selectCharacter(this, '👨‍🚀', 'Astronaut')">
      👨‍🚀
      <div class="character-name">Astronaut</div>
    </div>
    <div class="character-option" onclick="selectCharacter(this, '👩‍🚀', 'Space Girl')">
      👩‍🚀
      <div class="character-name">Space Girl</div>
    </div>
    <div class="character-option" onclick="selectCharacter(this, '🤖', 'Robo-Buddy')">
      🤖
      <div class="character-name">Robo-Buddy</div>
    </div>
    <div class="character-option" onclick="selectCharacter(this, '👽', 'Alien Friend')">
      👽
      <div class="character-name">Alien Friend</div>
    </div>
    <div class="character-option" onclick="selectCharacter(this, '🐱', 'Space Cat')">
      🐱
      <div class="character-name">Space Cat</div>
    </div>
    <div class="character-option" onclick="selectCharacter(this, '🐶', 'Space Pup')">
      🐶
      <div class="character-name">Space Pup</div>
    </div>
  </div>

</div>

<script>
function persistPlayer() {
  const userName = document.getElementById('userName').value.trim() || 'Explorer';
  SolarPlayer.save(userName, selectedCharacter, selectedCharacterName);
}

let selectedCharacter = '👨‍🚀';
let selectedCharacterName = 'Astronaut';

function selectCharacter(element, character, name) {
  document.querySelectorAll('.character-option').forEach(opt => {
    opt.classList.remove('selected');
  });
  element.classList.add('selected');
  selectedCharacter = character;
  selectedCharacterName = name;
  updatePreview();
  persistPlayer();
}

function updatePreview() {
  const userName = document.getElementById('userName').value.trim() || 'Explorer';
  persistPlayer();
  document.getElementById('previewCharacter').textContent = selectedCharacter;
  document.getElementById('previewName').textContent = userName;
}


// Initialize with default values
updatePreview();
</script>
</body>
</html>
