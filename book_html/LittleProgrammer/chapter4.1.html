<head>
  <meta charset="UTF-8">
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .kid-ch1-app {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 10px;
    box-sizing: border-box;
    background: #f8fafc;
    border-radius: 18px;
    border: 1px solid #d1d5db;
    box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
    overflow: visible;
    display: flex;
    flex-direction: column;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', Arial, sans-serif;
    color: #0f172a;
  }

  .kid-ch1-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    border-radius: 20px;
    color: #f8fafc;
    box-shadow: 0 14px 30px rgba(79, 70, 229, 0.2);
  }

  .kid-ch1-toolbar .chapter-pill {
    background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.24);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
  }

  .kid-ch1-toolbar .chapter-title {
    flex: 1;
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    min-width: 0;
  }

  .kid-panel {
    background: #ffffff;
    border: 1px solid #dbeafe;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    margin-bottom: 14px;
  }

  .kid-panel h2 {
    margin: 0 0 14px;
    font-size: 0.88rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #0f172a;
    font-weight: 700;
  }

  .kid-panel button {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    margin-right: 8px;
  }

  /* Mobile/tablet optimization */
  @media (max-width: 600px) {
    body { padding: 6px; }
    .kid-ch1-app { padding: 10px; border-radius: 12px; }
    .kid-ch1-toolbar { flex-direction: row; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 10px; }
    .kid-ch1-toolbar .chapter-title { font-size: 0.92rem; }
  }
  </style>
</head>
<body>
  <div class="kid-ch1-app">
    <div class="kid-ch1-toolbar">
      <span class="chapter-pill">Chapter 4.1</span>
      <span class="chapter-title">Looping Activity</span>
      <div class="chapter-nav"></div>
    </div>

    <div class="kid-panel">
      <p>A small example: press the button to make a dancer move in a loop.</p>
    </div>

    <div class="kid-panel">
      <button id="start">Start Loop</button>
      <button id="stop">Stop</button>
      <div id="box" style="width: 60px; height: 60px; background: linear-gradient(135deg, #fde68a 0%, #f59e0b 100%); margin-top: 16px; border-radius: 12px; transition: transform 0.25s;"></div>
    </div>
  </div>

  <script>
    let tid = null;
    let pos = 0;
    document.getElementById('start').addEventListener('click', () => {
      if (tid) return;
      pos = 0;
      tid = setInterval(() => {
        pos = (pos + 1) % 8;
        document.getElementById('box').style.transform = `translateX(${pos * 20}px)`;
      }, 250);
    });
    document.getElementById('stop').addEventListener('click', () => {
      clearInterval(tid);
      tid = null;
    });
  </script>
</body>
