<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chapter 2.1 — Move the Bunny</title>
  <style>
  :root {
    color-scheme: light;
    color: #102a43;
    background: #fff;
  }
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top left, rgba(255, 200, 128, 0.95), transparent 26%),
                radial-gradient(circle at top right, rgba(129, 199, 132, 0.95), transparent 24%),
                radial-gradient(circle at bottom left, rgba(129, 195, 243, 0.95), transparent 24%),
                linear-gradient(135deg, #ffe082 0%, #ffccbc 24%, #b39ddb 48%, #80deea 72%, #c5e1a5 100%);
    color: #172d50;
    line-height: 1.55;
    padding: 24px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
  }
  h1 {
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    margin: 0 0 14px;
    color: #0f172a;
    text-shadow: 0 3px 10px rgba(15, 23, 42, 0.12);
  }
  h2 {
    color: #1e3a8a;
    font-size: clamp(1.5rem, 2.5vw, 2rem);
    margin: 28px 0 12px;
  }
  p, li {
    font-size: 1.05rem;
    margin: 0 0 14px;
  }
  ul, ol {
    margin: 0 0 18px 22px;
    padding: 0;
  }
  li {
    margin-bottom: 10px;
  }
  .highlight {
    display: inline-block;
    background: rgba(251, 191, 36, 0.18);
    color: #b45309;
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 700;
  }
  .card {
    background: rgba(255, 255, 255, 0.95);
    border: 1px dashed rgba(15, 23, 42, 0.12);
    border-radius: 24px;
    padding: 20px;
    margin: 18px 0;
  }
  .big-splash {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 22px;
    background: rgba(249, 115, 22, 0.15);
    border-radius: 999px;
    margin-bottom: 18px;
    color: #92400e;
    font-weight: 800;
    box-shadow: 0 10px 24px rgba(249, 115, 22, 0.12);
  }
  a {
    color: #1d4ed8;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  .play-area {
    width: min(100%, 360px);
    aspect-ratio: 1;
    background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), #e3f2fd 65%);
    border-radius: 32px;
    border: 4px solid rgba(255, 255, 255, 0.84);
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 6px;
    padding: 10px;
    margin: 20px 0;
  }
  .cell {
    background: linear-gradient(180deg, #ffffff, #f3f4f6);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }
  .btn,
  .touch-grid button {
    background: linear-gradient(180deg, #fb7185, #f97316);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 12px 18px;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: 0 14px 28px rgba(249, 115, 22, 0.2);
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-top: 18px;
  }
  .status {
    margin-top: 16px;
    font-weight: 700;
    color: #1d4ed8;
  }
  .touch-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(60px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .touch-grid button {
    min-height: 60px;
    border-radius: 18px;
    background: white;
    color: #0f172a;
    box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Chapter 2.1 — Move the Bunny</h1>
    <p>Use arrow keys or the on-screen buttons to move the bunny to the star ⭐. Try it!</p>

    <div id="play" class="play-area" aria-label="Play area"></div>

    <div style="margin-left:auto">
        <a href="chapter2.html">◀ Back to Chapter 2</a>
      </div>
    </div>

    <div class="status" id="status">Moves: <span id="moves">0</span></div>

    <div style="margin-top:12px">
      <div class="touch-grid" id="touchBtns">
        <div></div><button class="btn" data-dir="up">↑</button><div></div>
        <button class="btn" data-dir="left">←</button><button class="btn" data-dir="down">↓</button><button class="btn" data-dir="right">→</button>
      </div>
    </div>
  </div>

  <script>
    // Simple 8x8 grid
    const cols = 8, rows = 8;
    const play = document.getElementById('play');
    let bunny = {x:1,y:6};
    let star = {x:6,y:1};
    let moves = 0;

    function buildGrid(){
      play.innerHTML = '';
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const cell = document.createElement('div');
          cell.className='cell';
          cell.dataset.x=c;cell.dataset.y=r;
          if(c===bunny.x && r===bunny.y){ cell.innerHTML='<span class="bunny">🐰</span>'; }
          else if(c===star.x && r===star.y){ cell.innerHTML='<span class="star">⭐</span>'; }
          play.appendChild(cell);
        }
      }
    }

    function setStatus(text){ document.getElementById('status').textContent = text; }
    function update(){ buildGrid(); document.getElementById('moves').textContent = moves; checkWin(); }

    function move(dx,dy){
      const nx = bunny.x + dx, ny = bunny.y + dy;
      if(nx<0||ny<0||nx>=cols||ny>=rows) return;
      bunny.x = nx; bunny.y = ny; moves++; update();
    }

    function checkWin(){
      if(bunny.x===star.x && bunny.y===star.y){
        setStatus('You did it! 🎉 Moves: ' + moves);
        showWinOverlay();
      } else {
        setStatus('Moves: ' + moves);
      }
    }

    function showWinOverlay(){
      const o = document.createElement('div');
      o.style.position='fixed';o.style.left=0;o.style.top=0;o.style.right=0;o.style.bottom=0;
      o.style.display='flex';o.style.alignItems='center';o.style.justifyContent='center';
      o.style.background='rgba(2,6,23,0.6)';o.style.zIndex=9999;
      o.innerHTML = '<div style="background:#fff;padding:20px;border-radius:8px;text-align:center;max-width:320px">'<
      + 'h2>Well done!</h2><p>You moved the bunny to the star.</p><button id="overlayClose" class="btn">Play again</button></div>';
      document.body.appendChild(o);
      document.getElementById('overlayClose').addEventListener('click', ()=>{ document.body.removeChild(o); reset(); });
    }

    function reset(){ bunny={x:1,y:6}; star={x:6,y:1}; moves=0; update(); }

    document.addEventListener('keydown', (e)=>{
      if(e.key==='ArrowUp') move(0,-1);
      if(e.key==='ArrowDown') move(0,1);
      if(e.key==='ArrowLeft') move(-1,0);
      if(e.key==='ArrowRight') move(1,0);
    });

    document.getElementById('reset').addEventListener('click', reset);

    document.getElementById('touchBtns').addEventListener('click',(e)=>{
      const d = e.target.getAttribute('data-dir'); if(!d) return;
      if(d==='up') move(0,-1); if(d==='down') move(0,1); if(d==='left') move(-1,0); if(d==='right') move(1,0);
    });

    // initial
    buildGrid();
  </script>
</body>
</html>
