<body>
  <h1>Chapter 6.1 — Using Variables</h1>
  <p>Simple example: a step counter that increases each move.</p>
  <div>Steps: <span id="count">0</span> <button id="inc">Move</button> <button id="reset">Reset</button></div>
  <script>
    let c=0; document.getElementById('inc').addEventListener('click', ()=>{ c++; document.getElementById('count').textContent=c; });
    document.getElementById('reset').addEventListener('click', ()=>{ c=0; document.getElementById('count').textContent=c; });
  </script>

</body>
