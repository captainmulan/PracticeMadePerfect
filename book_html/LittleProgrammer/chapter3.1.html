<body>
  <h1>Chapter 3.1 — Simple Event Program</h1>
  <p>This tiny activity shows how a program can react to key presses and button clicks.</p>
  <div style="margin-top:12px">
    <button id="sayHi">Say Hello</button>
    <div id="out" style="margin-top:8px;color:#064e3b"></div>
  </div>
  <script>
    document.getElementById('sayHi').addEventListener('click', ()=> document.getElementById('out').textContent = 'Hello — the program heard your click!');
    document.addEventListener('keydown', (e)=>{ if(e.key==='h' || e.key==='H') document.getElementById('out').textContent = 'You pressed H — nice!'; });
  </script>
  <p style="margin-top:12px"><a href="chapter3.html">◀ Back to Chapter 3</a></p>
</body>
