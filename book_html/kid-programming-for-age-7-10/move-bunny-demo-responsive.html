<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .kid-ch1-app {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
      background: #f8fafc;
      border-radius: 18px;
      border: 1px solid #d1d5db;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
      overflow: visible;
      display: flex;
      flex-direction: column;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #0f172a;
    }

    .kid-ch1-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 20px;
      color: #f8fafc;
      box-shadow: 0 14px 30px rgba(79, 70, 229, 0.2);
    }

    .kid-ch1-toolbar .chapter-pill {
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.24);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .kid-ch1-toolbar .chapter-title {
      flex: 1;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      min-width: 0;
    }

    .kid-ch1-toolbar .chapter-nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .kid-ch1-toolbar .chapter-nav button {
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.08);
      color: #f8fafc;
      border-radius: 12px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      cursor: not-allowed;
      opacity: 0.88;
    }

    .kid-ch1-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
    }

    .kid-ch1-header .icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .kid-ch1-header .title {
      flex: 1;
    }

    .kid-ch1-header .title h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .kid-ch1-header .title p {
      font-size: 0.95rem;
      color: #475569;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .kid-ch1-header .progress {
      background: #e0e7ff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #4338ca;
      white-space: nowrap;
    }

    /* Layout: left = program, right = stage */
    .kid-ch1-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1.05fr) minmax(280px, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .kid-left-column {
      display: grid;
      gap: 14px;
      min-height: 0;
      overflow: hidden;
    }

    .kid-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .kid-left-column {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .kid-program-label {
      margin-bottom: 8px;
      color: #64748b;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .kid-program {
      display: grid;
      gap: 8px;
    }

    .kid-block-pool {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }

    .kid-block {
      border-radius: 14px;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 2px solid #f59e0b;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: grab;
      user-select: none;
      text-align: center;
      color: #92400e;
      box-shadow: 0 8px 18px rgba(245, 158, 11, 0.16);
    }

    .kid-blocks {
      grid-template-columns: repeat(2, minmax(100px, 1fr));
      gap: 10px;
    }

    .kid-stage {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      height: 100%;
    }

    /* Board: fill the stage panel and use a 6x6 grid */
    .kid-board {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 360px;
      width: 100%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .kid-panel {
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .kid-panel h2 {
      margin: 0 0 14px;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0f172a;
      font-weight: 700;
    }

    .kid-blocks,
    .kid-program {
      display: grid;
      gap: 10px;
    }

    .kid-blocks {
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }

    .kid-slot,
    .kid-block {
      border-radius: 14px;
      background: linear-gradient(135deg, #eef2ff 0%, #dbeafe 100%);
      border: 2px solid #c7d2fe;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: grab;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
      text-align: center;
      color: #3730a3;
      min-height: 54px;
      display: grid;
      place-items: center;
    }

    .kid-slot.empty {
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .kid-slot.dragging {
      opacity: 0.6;
      transform: scale(0.98);
      cursor: grabbing;
    }

    .kid-actions {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .kid-actions button {
      width: 100%;
      min-width: 0;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .run-btn {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .reset-btn {
      background: #e2e8f0;
      color: #334155;
    }

    .kid-goal {
      display: grid;
      gap: 10px;
      border-radius: 16px;
      background: #eff6ff;
      border: 2px solid #bfdbfe;
      padding: 14px;
      margin-top: 14px;
    }

    .kid-stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #475569;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0 4px;
    }

    .kid-board {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 360px;
      aspect-ratio: 1 / 1;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .kid-board::before {
      display: none;
    }

    .kid-cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      background: #16213d;
      display: grid;
      place-items: center;
      color: #f8fafc;
      font-size: 2rem;
      border: 2px solid #334155;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .kid-cell.start,
    .kid-cell.goal {
      font-size: 2.6rem;
      text-shadow: 0 0 8px rgba(255,255,255,0.35);
    }

    .kid-cell.start {
      background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
      border-color: #60a5fa;
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), 0 0 0 4px rgba(59,130,246,0.18);
    }

    .kid-cell.goal {
      background: #0f172a;
      border-color: #fcd34d;
      color: #fef3c7;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12), 0 0 0 4px rgba(252,211,77,0.18);
    }

    .kid-message {
      margin-top: 10px;
      padding: 10px;
      border-radius: 14px;
      background: #eff6ff;
      border: 2px solid #bfdbfe;
      color: #0f172a;
      font-size: 0.85rem;
      line-height: 1.5;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    /* Mobile/tablet optimization: try side-by-side with horizontal fallback */
    @media (max-width: 600px) {
      body { padding: 6px; }
      .kid-ch1-app { padding: 10px; border-radius: 12px; min-height: auto; max-height: none; overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Toolbar reduces padding but stays compact */
      .kid-ch1-toolbar { flex-direction: row; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 10px; }
      .kid-ch1-toolbar .chapter-title { font-size: 0.92rem; }
      .kid-ch1-toolbar .chapter-nav button { width: 32px; height: 32px; }

      /* Layout: stack panels vertically to fit narrow screens */
      .kid-ch1-layout { grid-template-columns: 1fr; gap: 8px; min-width: auto; }
      .kid-stage { order: 0; }

      /* Panels: slightly reduced internal padding for mobile */
      .kid-panel { padding: 10px; border-radius: 12px; }
      .kid-panel h2 { font-size: 0.82rem; }

      /* Program blocks and actions */
      .kid-blocks { grid-template-columns: 1fr; }
      .kid-program { grid-template-columns: 1fr; }
      /* Compact action buttons on mobile */
      .kid-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center; }
      .kid-actions button { width: auto; min-width: 108px; padding: 6px 10px; font-size: 0.82rem; }

      /* Board: reduce height and allow responsive fit */
      .kid-board { aspect-ratio: auto; min-height: 260px; max-height: none; overflow-x: auto; padding: 8px; gap: 6px; width: 100%; grid-template-columns: repeat(6, minmax(0, 1fr)); grid-auto-rows: minmax(0, 1fr); }
      .kid-cell { aspect-ratio: 1; width: 100%; min-width: 0; min-height: 0; font-size: 1.6rem; }
      .kid-board::before { display: none; }

      /* Keep messages compact */
      .kid-message { padding: 8px; font-size: 0.82rem; }
    }

    @media (max-width: 420px) {
      .kid-board { max-height: none; }
      .kid-cell { height: auto; }
      .kid-ch1-header .title h1 { font-size: 1rem; }
      .kid-ch1-header .title p { font-size: 0.9rem; }
      .kid-ch1-toolbar .chapter-pill { padding: 6px 10px; font-size: 0.78rem; }
    }

    /* Accessibility */
    .kid-block:focus,
    .kid-actions button:focus,
    .kid-slot:focus {
      outline: 3px solid #667eea;
      outline-offset: 2px;
    }

    /* Animation for running */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .kid-cell.bunny-moving { animation: pulse 0.4s ease-in-out; }
  </style>
</head>
<body>
  <div class="kid-ch1-app">
    <div class="kid-ch1-layout">
      <div class="kid-left-column">
        <div class="kid-panel">
          <h2>Blocks or Steps</h2>
          <div class="kid-block-pool" id="blockPool">
            <div class="kid-block" data-code="move-forward" draggable="true">Move Forward</div>
            <div class="kid-block" data-code="move-forward" draggable="true">Move Forward</div>
            <div class="kid-block" data-code="move-forward" draggable="true">Move Forward</div>
            <div class="kid-block" data-code="move-forward" draggable="true">Move Forward</div>
            <div class="kid-block" data-code="move-forward" draggable="true">Move Forward</div>
            <div class="kid-block" data-code="turn-right" draggable="true">Turn Right</div>
            <div class="kid-block" data-code="turn-right" draggable="true">Turn Right</div>
            <div class="kid-block" data-code="turn-left" draggable="true">Turn Left</div>
            <div class="kid-block" data-code="turn-left" draggable="true">Turn Left</div>
          </div>
        </div>

        <div class="kid-panel">
          <h2>Program</h2>
          <div class="kid-program-label">When program run</div>
          <div class="kid-program" id="programSlots">
            <div class="kid-slot empty" data-index="0"></div>
            <div class="kid-slot empty" data-index="1"></div>
            <div class="kid-slot empty" data-index="2"></div>
            <div class="kid-slot empty" data-index="3"></div>
            <div class="kid-slot empty" data-index="4"></div>
            <div class="kid-slot empty" data-index="5"></div>
            <div class="kid-slot empty" data-index="6"></div>
          </div>

          <div class="kid-actions">
            <button class="run-btn" id="runButton">▶ Run</button>
            <button class="reset-btn" id="resetButton">↺ Reset</button>
          </div>

          <div class="kid-feedback" id="feedback">Drop blocks into the program and press Run.</div>
        </div>
      </div>

      <div class="kid-panel kid-stage">
        <div class="kid-stage-header">
          <span>🎮 Stage</span>
          <span id="moveCounter">0 / 7 steps</span>
        </div>
        <div class="kid-board" id="boardGrid">
          <!-- 6x6 grid -->
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>

          <div class="kid-cell"></div>
          <div class="kid-cell start" id="bunnyCell">🐰</div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>

          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell goal" id="goalCell">⭐</div>

          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>

          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>

          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
          <div class="kid-cell"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const slots = Array.from(document.querySelectorAll('.kid-slot'));
      const blocks = Array.from(document.querySelectorAll('.kid-block'));
      const runButton = document.getElementById('runButton');
      const resetButton = document.getElementById('resetButton');
      const moveCounter = document.getElementById('moveCounter');
      const feedback = document.getElementById('feedback');
      const board = Array.from(document.querySelectorAll('.kid-cell'));
      let program = [];
      let bunnyIndex = 6;
      let bunnyDirection = 'right';
      let isRunning = false;
      const validMoves = 7;

      const getPositionCoords = (position) => ({
        row: Math.floor(position / 6),
        col: position % 6
      });

      const getNextPosition = (position, direction) => {
        const { row, col } = getPositionCoords(position);
        if (direction === 'right' && col < 5) return position + 1;
        if (direction === 'left' && col > 0) return position - 1;
        if (direction === 'down' && row < 5) return position + 6;
        if (direction === 'up' && row > 0) return position - 6;
        return position;
      };

      const updateSlots = () => {
        slots.forEach((slot, index) => {
          const code = program[index];
          if (code) {
            slot.textContent =
              code === 'move-forward' ? 'Move Forward' :
              code === 'turn-left' ? 'Turn Left' :
              'Turn Right';
            slot.classList.remove('empty');
            slot.classList.add('filled');
          } else {
            slot.textContent = 'Drop block here';
            slot.classList.remove('filled');
            slot.classList.add('empty');
          }
        });
        moveCounter.textContent = `${program.filter(Boolean).length} / ${validMoves} steps`;
      };

      const renderBoard = (position, direction = bunnyDirection) => {
        board.forEach((cell) => {
          if (!cell.classList.contains('goal')) {
            cell.textContent = '';
          }
          cell.classList.remove('start');
          cell.style.transform = 'rotate(0deg)';
          cell.style.filter = 'none';
        });
        const bunnyCell = board[position];
        if (bunnyCell) {
          bunnyCell.textContent = '🐰';
          bunnyCell.classList.add('start');
          const rotation = direction === 'down' ? '90deg' : direction === 'left' ? '180deg' : direction === 'up' ? '270deg' : '0deg';
          bunnyCell.style.transform = `rotate(${rotation})`;
          bunnyCell.style.filter = 'drop-shadow(0 0 8px rgba(255,255,255,0.35))';
        }
      };

      const resetProgram = () => {
        program = [];
        bunnyIndex = 6;
        bunnyDirection = 'right';
        updateSlots();
        renderBoard(6, bunnyDirection);
        runButton.textContent = '▶ Run';
        feedback.textContent = 'Drag a block to a slot and press Run. Tap a filled slot to remove it.';
      };

      blocks.forEach((block) => {
        block.addEventListener('dragstart', (event) => {
          if (isRunning) return;
          const code = block.dataset.code;
          event.dataTransfer.effectAllowed = 'copy';
          event.dataTransfer.setData('text/plain', code);
          block.classList.add('dragging');
        });

        block.addEventListener('dragend', () => {
          block.classList.remove('dragging');
        });
      });

      slots.forEach((slot, index) => {
        slot.addEventListener('dragover', (event) => {
          if (isRunning) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = 'copy';
          slot.classList.add('drag-over');
        });

        slot.addEventListener('dragleave', () => {
          slot.classList.remove('drag-over');
        });

        slot.addEventListener('drop', (event) => {
          if (isRunning) return;
          event.preventDefault();
          event.stopPropagation();
          slot.classList.remove('drag-over');
          const code = event.dataTransfer.getData('text/plain');
          if (!code) return;
          program[index] = code;
          updateSlots();
          feedback.textContent = 'Block added to the program. Nice!';
        });

        slot.addEventListener('click', () => {
          if (isRunning) return;
          if (slot.classList.contains('filled')) {
            program[index] = null;
            updateSlots();
            feedback.textContent = 'Block removed from the program.';
          }
        });
      });

      runButton.addEventListener('click', async () => {
        if (isRunning) return;
        const steps = program.filter(Boolean);
        if (steps.length === 0) {
          feedback.textContent = '⚠️ Add blocks to the program before you run.';
          return;
        }        if (steps.length !== validMoves) {
          feedback.textContent = `⚠️ Your program must use exactly ${validMoves} steps.`;
          return;
        }        isRunning = true;
        runButton.disabled = true;
        resetButton.disabled = true;
        runButton.textContent = '▶ Running...';

        let position = bunnyIndex;
        let direction = bunnyDirection;
        for (const step of steps) {
          if (step === 'move-forward') {
            position = getNextPosition(position, direction);
          } else if (step === 'turn-right') {
            direction = direction === 'right' ? 'down' : direction === 'down' ? 'left' : direction === 'left' ? 'up' : 'right';
          } else if (step === 'turn-left') {
            direction = direction === 'up' ? 'right' : direction === 'right' ? 'down' : direction === 'down' ? 'left' : 'up';
          }
          bunnyDirection = direction;
          renderBoard(position, direction);
          await new Promise((resolve) => setTimeout(resolve, 500));
        }

        bunnyIndex = position;
        bunnyDirection = direction;
        isRunning = false;
        runButton.disabled = false;
        resetButton.disabled = false;
        runButton.textContent = '▶ Run';

        if (position === 17) {
          alert('✨ Success! The bunny reached the star!');
        } else {
          alert('❌ Not quite yet. Try a different order.');
        }
      });

      resetButton.addEventListener('click', () => {
        if (isRunning) return;
        resetProgram();
      });

      resetProgram();
    })();
  </script>
</body>
