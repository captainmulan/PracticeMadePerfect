<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Adventure - Choose Your Diver</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;background:linear-gradient(180deg,#0a1628 0%,#1a365d 50%,#0f4c75 100%);color:#e0f4ff;min-height:100vh;overflow-x:hidden;overflow-y:auto;}
    .bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(3px 3px at 30px 50px,rgba(255,255,255,.3),transparent),radial-gradient(4px 4px at 70px 90px,rgba(255,255,255,.2),transparent),radial-gradient(2px 2px at 120px 40px,rgba(255,255,255,.3),transparent);background-size:900px 150px;animation:rise 8s ease-in-out infinite;}
    @keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    .container{max-width:640px;margin:auto;padding:16px 14px 20px;position:relative;z-index:1;}
    .header{text-align:center;margin-bottom:14px;}
    h1{font-size:28px;color:#64ffda;margin-bottom:8px;}
    .subtitle{color:#80deea;font-size:16px;}
    input[type="text"]{width:100%;padding:10px 12px;border:2px solid rgba(100,255,218,.35);border-radius:16px;background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:inherit;margin-bottom:14px;outline:none;}
    input[type="text"]:focus{border-color:#64ffda;}
    .character-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
    .character-option{background:rgba(255,255,255,.08);border:3px solid transparent;border-radius:18px;padding:10px 4px;cursor:pointer;text-align:center;font-size:34px;transition:.2s;}
    .character-option.selected{border-color:#ffeb3b;background:rgba(255,235,59,.15);box-shadow:0 0 24px rgba(255,235,59,.35);}
    .character-name{font-size:12px;margin-top:6px;color:#80deea;}
    .preview-section{background:rgba(255,255,255,.1);border-radius:20px;padding:14px;text-align:center;margin-bottom:12px;border:1px solid rgba(255,255,255,.12);}
    .preview-character{font-size:56px;margin-bottom:8px;}
    .preview-name{font-size:18px;color:#ffeb3b;font-weight:bold;}
    .nav-hint{margin-top:16px;text-align:center;font-size:13px;color:#80deea;background:rgba(128,222,234,.1);padding:10px;border-radius:10px;}
    @media (max-width:480px){h1{font-size:22px}.character-option{font-size:28px;padding:8px 2px}}
  </style>
<script>
(function (w) {
  var BOOK = "oceanadventure";
  function key(name) { return "book:" + BOOK + ":" + name; }
  w.OceanPlayer = {
    getUserName: function () { return localStorage.getItem(key("userName")) || localStorage.getItem("userName") || "Explorer"; },
    getCharacter: function () { return localStorage.getItem(key("userCharacter")) || localStorage.getItem("userCharacter") || "🤿"; },
    getCharacterName: function () { return localStorage.getItem(key("characterName")) || localStorage.getItem("characterName") || "Diver"; },
    save: function (name, character, characterName) {
      localStorage.setItem(key("userName"), name);
      localStorage.setItem(key("userCharacter"), character);
      if (characterName != null) localStorage.setItem(key("characterName"), characterName);
      localStorage.setItem("userName", name);
      localStorage.setItem("userCharacter", character);
      if (characterName != null) localStorage.setItem("characterName", characterName);
    }
  };
})(window);
</script>
</head>
<body>
<div class="bubbles"></div>
<div class="container">
  <div class="header">
    <h1>🤿 Choose Your Diver!</h1>
    <div class="subtitle">Pick a character and name for your ocean adventure!</div>
  </div>
  <div class="preview-section">
    <div class="preview-character" id="previewCharacter">🤿</div>
    <div class="preview-name" id="previewName">Explorer</div>
  </div>
  <input type="text" id="userName" placeholder="Enter your name..." value="Explorer" oninput="updatePreview()">
  <div class="character-grid">
    <div class="character-option selected" onclick="selectCharacter(this, '🤿', 'Diver')">🤿<div class="character-name">Diver</div></div>
    <div class="character-option" onclick="selectCharacter(this, '🐬', 'Dolphin')">🐬<div class="character-name">Dolphin</div></div>
    <div class="character-option" onclick="selectCharacter(this, '🐙', 'Octopus')">🐙<div class="character-name">Octopus</div></div>
    <div class="character-option" onclick="selectCharacter(this, '🐢', 'Sea Turtle')">🐢<div class="character-name">Sea Turtle</div></div>
    <div class="character-option" onclick="selectCharacter(this, '🦈', 'Shark Buddy')">🦈<div class="character-name">Shark Buddy</div></div>
    <div class="character-option" onclick="selectCharacter(this, '🐠', 'Clownfish')">🐠<div class="character-name">Clownfish</div></div>
  </div>
  <div class="nav-hint">
    <div>💡 Use the ← → arrows in the top navigation bar to go to the next chapter.</div>
    <div>💡 Use the 🏠 button in the top navigation bar to go back to the Home page.</div>
  </div>
</div>
<script>
let selectedCharacter = '🤿';
let selectedCharacterName = 'Diver';
function persistPlayer() {
  const userName = document.getElementById('userName').value.trim() || 'Explorer';
  OceanPlayer.save(userName, selectedCharacter, selectedCharacterName);
}
function selectCharacter(element, character, name) {
  document.querySelectorAll('.character-option').forEach(opt => opt.classList.remove('selected'));
  element.classList.add('selected');
  selectedCharacter = character;
  selectedCharacterName = name;
  updatePreview();
}
function updatePreview() {
  persistPlayer();
  document.getElementById('previewCharacter').textContent = selectedCharacter;
  document.getElementById('previewName').textContent = document.getElementById('userName').value.trim() || 'Explorer';
}
updatePreview();
</script>
</body>
</html>
