<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First 100 Myanmar Words - Overall Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Comic Sans MS','Comic Neue','Myanmar Text',Padauk,system-ui,sans-serif;background:linear-gradient(165deg,#FFF8E7 0%,#FFE4B5 40%,#FFDAB9 100%);color:#3d2914;min-height:100vh;}
.container{max-width:640px;margin:auto;padding:16px 14px 32px;}
.header{text-align:center;margin-bottom:14px;}
h1{font-size:26px;color:#C41E3A;}
.quiz-card{background:rgba(255,255,255,.85);border-radius:16px;padding:16px;margin-bottom:12px;border:2px solid rgba(196,30,58,.2);}
.question{font-size:17px;font-weight:bold;margin-bottom:12px;}
.options{display:flex;flex-direction:column;gap:8px;}
.option{padding:12px;border:2px solid #ddd;border-radius:12px;cursor:pointer;background:#fff;font-family:'Myanmar Text',Padauk,sans-serif;font-size:17px;}
.option.correct{background:#d4edda;border-color:#28a745;}
.option.wrong{background:#f8d7da;border-color:#dc3545;}
.score-bar{text-align:center;font-size:18px;color:#C41E3A;font-weight:bold;margin:12px 0;}
.nav-hint{margin-top:16px;text-align:center;font-size:13px;color:#8B4513;background:rgba(255,215,0,.25);padding:10px;border-radius:10px;}
</style>
<script src="_mmwords-player.js"></script>
<script src="_mmwords-data.js"></script>
<script src="_mmwords-games.js"></script>
</head>
<body>
<div class="container">
  <div class="header"><h1>🏆 Overall Quiz</h1><p style="color:#8B4513;">Words from all 10 chapters!</p></div>
  <div class="score-bar">Score: <span id="score">0</span> / <span id="total">8</span></div>
  <div id="quiz"></div>
  <div class="nav-hint">8/8 earns the Myanmar Word Champion badge!</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var all = [];
  MM_CHAPTERS.forEach(function(ch){ all = all.concat(ch.words); });
  var questions = MMGame.buildQuiz(all, 8);
  document.getElementById('total').textContent = questions.length;
  var score = 0, answered = 0;
  var area = document.getElementById('quiz');
  questions.forEach(function(q, qi){
    var card = document.createElement('div');
    card.className = 'quiz-card';
    card.innerHTML = '<div class="question">Q'+(qi+1)+'. '+q.prompt+'</div><div class="options"></div>';
    var opts = card.querySelector('.options');
    q.options.forEach(function(opt){
      var btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'option'; btn.textContent = opt;
      btn.onclick = function(){
        if (opts.dataset.done) return;
        opts.dataset.done = '1'; answered++;
        if (opt === q.correct) { btn.classList.add('correct'); score++; MMAudio.speak(opt,'my-MM'); }
        else { btn.classList.add('wrong'); Array.from(opts.children).forEach(function(b){ if(b.textContent===q.correct) b.classList.add('correct'); }); }
        document.getElementById('score').textContent = score;
        if (answered === questions.length && score === questions.length) MMPlayer.earnBadge('Myanmar Word Champion');
      };
      opts.appendChild(btn);
    });
    area.appendChild(card);
  });
});
</script>
</body>
</html>
