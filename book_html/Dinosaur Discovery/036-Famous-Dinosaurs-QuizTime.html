<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinosaur Discovery - Famous Dinosaurs Quiz Time</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;
      background:linear-gradient(180deg,#2d1b0e 0%,#4a2c2a 50%,#5c3d3a 100%);
      color:#f5e6d3;
      min-height:100vh;
      position:relative;
      overflow-x:hidden;
    }
    .leaves{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      background-image:
        radial-gradient(4px 4px at 40px 60px,rgba(76,175,80,0.3),transparent),
        radial-gradient(5px 5px at 80px 100px,rgba(139,195,74,0.2),transparent),
        radial-gradient(3px 3px at 140px 50px,rgba(76,175,80,0.3),transparent),
        radial-gradient(4px 4px at 200px 90px,rgba(139,195,74,0.2),transparent),
        radial-gradient(3px 3px at 260px 70px,rgba(76,175,80,0.3),transparent),
        radial-gradient(5px 5px at 320px 110px,rgba(139,195,74,0.2),transparent),
        radial-gradient(3px 3px at 380px 50px,rgba(76,175,80,0.3),transparent),
        radial-gradient(4px 4px at 440px 90px,rgba(139,195,74,0.2),transparent),
        radial-gradient(3px 3px at 500px 60px,rgba(76,175,80,0.3),transparent),
        radial-gradient(5px 5px at 560px 100px,rgba(139,195,74,0.2),transparent);
      background-size:900px 150px;
      animation:fall 10s linear infinite;
      z-index:0;
    }
    @keyframes fall{
      0%{transform:translateY(-100%);}
      100%{transform:translateY(100%);}
    }
    .container{
      max-width:640px;
      margin:auto;
      padding:32px 16px 40px;
      position:relative;
      z-index:1;
    }
    .header{
      text-align:center;
      margin-bottom:30px;
    }
    h1{
      font-size:32px;
      color:#9c27b0;
      margin-bottom:8px;
    }
    .subtitle{
      color:#a5d6a7;
      font-size:16px;
    }
    .vs-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,0.1);
      border-radius:16px;
      padding:16px;
      margin-bottom:20px;
    }
    .player-info{
      text-align:center;
      flex:1;
    }
    .player-emoji{
      font-size:48px;
    }
    .player-name{
      font-size:14px;
      margin-top:4px;
    }
    .player-score{
      font-size:24px;
      font-weight:bold;
      color:#9c27b0;
    }
    .vs-text{
      font-size:28px;
      font-weight:bold;
      color:#ff5722;
      margin:0 16px;
    }
    .quiz-card{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:20px;
      padding:24px;
      margin-bottom:16px;
      border:2px solid rgba(156,39,176,0.3);
    }
    .question{
      font-size:18px;
      font-weight:bold;
      margin-bottom:16px;
      color:#fff;
    }
    .options{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .option{
      padding:14px 18px;
      background:rgba(255,255,255,0.05);
      border:2px solid rgba(255,255,255,0.2);
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      transition:0.2s;
      text-align:center;
    }
    .option:hover{
      background:rgba(255,255,255,0.1);
      border-color:#9c27b0;
    }
    .option.correct{
      background:rgba(76,175,80,0.3);
      border-color:#4caf50;
    }
    .option.wrong{
      background:rgba(244,67,54,0.3);
      border-color:#f44336;
    }
    .feedback{
      margin-top:12px;
      padding:12px;
      border-radius:10px;
      font-size:15px;
      display:none;
    }
    .feedback.show{
      display:block;
    }
    .feedback.correct{
      background:rgba(76,175,80,0.2);
      color:#81c784;
    }
    .feedback.wrong{
      background:rgba(244,67,54,0.2);
      color:#e57373;
    }
    .podium{
      display:none;
      background:linear-gradient(135deg,#9c27b0,#7b1fa2);
      border-radius:20px;
      padding:24px;
      margin-top:20px;
    }
    .podium.show{
      display:block;
    }
    .podium h2{
      text-align:center;
      color:#f5e6d3;
      font-size:24px;
      margin-bottom:20px;
    }
    .podium-stand{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:12px;
      height:150px;
    }
    .stand{
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .stand-emoji{
      font-size:48px;
      margin-bottom:8px;
    }
    .stand-name{
      font-size:12px;
      color:#f5e6d3;
      margin-bottom:4px;
    }
    .stand-bar{
      background:linear-gradient(180deg,#ffd700,#ff9800);
      border-radius:8px 8px 0 0;
      width:60px;
    }
    .stand-bar.silver{
      background:linear-gradient(180deg,#c0c0c0,#a0a0a0);
    }
    .stand-bar.bronze{
      background:linear-gradient(180deg,#cd7f32,#a0522d);
    }
    .next-btn{
      width:100%;
      padding:16px;
      background:linear-gradient(135deg,#ff9800,#f57c00);
      border:none;
      border-radius:12px;
      color:#2d1b0e;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:transform 0.2s;
      margin-top:16px;
    }
    .next-btn:hover{
      transform:scale(1.02);
    }
    .nav-hint{
      margin-top:20px;
      text-align:center;
      font-size:13px;
      color:#a5d6a7;
      background:rgba(165,214,167,0.1);
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>
<body>
<div class="leaves"></div>
<div class="container">
  <div class="header">
    <h1>❓ Quiz Time!</h1>
    <div class="subtitle">Compete against Dr. Rex!</div>
  </div>

  <div class="vs-bar">
    <div class="player-info">
      <div class="player-emoji" id="playerEmoji">🧭</div>
      <div class="player-name" id="playerName">You</div>
      <div class="player-score" id="playerScore">0</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="player-info">
      <div class="player-emoji">🧪</div>
      <div class="player-name">Dr. Rex</div>
      <div class="player-score" id="drRexScore">0</div>
    </div>
  </div>

  <div class="quiz-card" id="quizContainer">
    <div class="question" id="question">Loading question...</div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="podium" id="podium">
    <h2>🏆 Quiz Complete!</h2>
    <div class="podium-stand">
      <div class="stand">
        <div class="stand-emoji">🥉</div>
        <div class="stand-name" id="thirdName">-</div>
        <div class="stand-bar bronze" style="height:60px;"></div>
      </div>
      <div class="stand">
        <div class="stand-emoji">🥇</div>
        <div class="stand-name" id="firstName">-</div>
        <div class="stand-bar" style="height:100px;"></div>
      </div>
      <div class="stand">
        <div class="stand-emoji">🥈</div>
        <div class="stand-name" id="secondName">-</div>
        <div class="stand-bar silver" style="height:80px;"></div>
      </div>
    </div>
    <button class="next-btn" onclick="nextChapter()">Next Chapter →</button>
  </div>

<div class="nav-hint">
  <div>💡 Answer the quiz questions to compete against Dr. Rex!</div>
  <div>💡 Use the 🏠 button in the top navigation bar to go back to the Home page.</div>
</div>

</div>

<script>
const playerName = localStorage.getItem('dinoPlayerName') || 'Explorer';
const playerCharacter = localStorage.getItem('dinoPlayerCharacter') || 'explorer';
const characterEmojis = {
  'explorer': '🧭',
  'scientist': '🔬',
  'adventurer': '🎒',
  'ranger': '🏕️',
  'pilot': '✈️',
  'captain': '⚓'
};

document.getElementById('playerEmoji').textContent = characterEmojis[playerCharacter];
document.getElementById('playerName').textContent = playerName;

let playerScore = 0;
let drRexScore = 0;
let currentQuestion = 0;

const questions = [
  {
    question: 'Which is the most famous dinosaur?',
    options: ['Triceratops', 'Tyrannosaurus Rex', 'Stegosaurus', 'Brachiosaurus'],
    correct: 1
  },
  {
    question: 'How many horns did Triceratops have?',
    options: ['One', 'Two', 'Three', 'Four'],
    correct: 2
  },
  {
    question: 'What did Stegosaurus have on its back?',
    options: ['Spikes', 'Plates', 'Horns', 'Nothing'],
    correct: 1
  },
  {
    question: 'What was special about Brachiosaurus?',
    options: ['It was the fastest', 'It had a super long neck', 'It could fly', 'It lived in water'],
    correct: 1
  },
  {
    question: 'When was the first dinosaur named?',
    options: ['1824', '1900', '1950', '2000'],
    correct: 0
  }
];

function loadQuestion() {
  if (currentQuestion >= questions.length) {
    showPodium();
    return;
  }

  const q = questions[currentQuestion];
  document.getElementById('question').textContent = q.question;
  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(i, q.correct);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(selected, correct) {
  const feedback = document.getElementById('feedback');
  const options = document.querySelectorAll('.option');
  
  options.forEach(opt => opt.style.pointerEvents = 'none');
  
  if (selected === correct) {
    options[selected].classList.add('correct');
    feedback.textContent = '✅ Correct! Great job!';
    feedback.className = 'feedback show correct';
    playerScore++;
  } else {
    options[selected].classList.add('wrong');
    options[correct].classList.add('correct');
    feedback.textContent = '❌ Not quite. Dr. Rex gets this one!';
    feedback.className = 'feedback show wrong';
    drRexScore++;
  }
  
  updateScores();
  setTimeout(() => {
    currentQuestion++;
    feedback.classList.remove('show');
    loadQuestion();
  }, 1500);
}

function updateScores() {
  document.getElementById('playerScore').textContent = playerScore;
  document.getElementById('drRexScore').textContent = drRexScore;
}

function showPodium() {
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('podium').classList.add('show');
  
  const scores = [
    {name: playerName, score: playerScore},
    {name: 'Dr. Rex', score: drRexScore},
    {name: 'Random Dino', score: Math.floor(Math.random() * 3)}
  ];
  
  scores.sort((a, b) => b.score - a.score);
  
  document.getElementById('firstName').textContent = scores[0].name;
  document.getElementById('secondName').textContent = scores[1].name;
  document.getElementById('thirdName').textContent = scores[2].name;
}

function nextChapter() {
  window.location.href = '037-Prehistoric-World-Activity.html';
}

loadQuestion();
</script>
</body>
</html>
