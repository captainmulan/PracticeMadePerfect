<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 3 - JS Programmer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Comic Sans MS', 'Comic Neue', system-ui, sans-serif;
      background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%);
      min-height: 100vh;
      color: #1a1a2e;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      color: #2e7d32;
      margin-bottom: 8px;
    }

    .page-number {
      font-size: 14px;
      color: #666;
      background: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border: 3px solid #e5e7eb;
    }

    .quiz-question {
      font-size: 20px;
      margin-bottom: 16px;
      color: #333;
    }

    .quiz-options {
      display: grid;
      gap: 12px;
    }

    .quiz-option {
      padding: 16px;
      font-size: 18px;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quiz-option:hover {
      border-color: #2e7d32;
      background: #f1f8e9;
    }

    .quiz-option.correct {
      border-color: #4caf50;
      background: #e8f5e9;
    }

    .quiz-option.incorrect {
      border-color: #f44336;
      background: #ffebee;
    }

    .quiz-option.disabled {
      pointer-events: none;
    }

    .score-box {
      text-align: center;
      margin-top: 16px;
    }

    .score {
      font-size: 36px;
      font-weight: bold;
      color: #2e7d32;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      flex: 1;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(46,125,50,0.3);
      transition: transform 0.2s;
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    .nav-btn.back {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3);
    }

    .progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d1d5db;
    }

    .progress-dot.active {
      background: #2e7d32;
      width: 32px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="progress">
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot active"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>

    <div class="header">
      <div class="logo">🎯</div>
      <h1>Quiz Time!</h1>
      <div class="page-number">Quiz 3</div>
    </div>

    <div class="card">
      <div class="quiz-question" id="q1">1. What beats rock?</div>
      <div class="quiz-options" id="q1-options">
        <div class="quiz-option" data-answer="false">Scissors</div>
        <div class="quiz-option" data-answer="true">Paper</div>
        <div class="quiz-option" data-answer="false">Rock</div>
      </div>
    </div>

    <div class="card">
      <div class="quiz-question" id="q2">2. What is an array?</div>
      <div class="quiz-options" id="q2-options">
        <div class="quiz-option" data-answer="true">A list of items</div>
        <div class="quiz-option" data-answer="false">A type of fruit</div>
        <div class="quiz-option" data-answer="false">A computer part</div>
      </div>
    </div>

    <div class="card">
      <div class="quiz-question" id="q3">3. What does Math.random() * 3 give?</div>
      <div class="quiz-options" id="q3-options">
        <div class="quiz-option" data-answer="false">Either 0, 1, or 2</div>
        <div class="quiz-option" data-answer="true">A random number between 0 (inclusive) and 3 (exclusive)</div>
        <div class="quiz-option" data-answer="false">Exactly 3</div>
      </div>
    </div>

    <div class="card score-box" id="score-card" style="display: none;">
      <div class="score" id="score">0/3</div>
      <p style="margin-top: 12px; font-size: 18px;">Amazing! 🌟</p>
    </div>

    <div class="btn-group">
      <button class="nav-btn back" onclick="window.location.href='07-rock-paper-scissors.html'">
        ← Back
      </button>
      <button class="nav-btn" onclick="window.location.href='09-coin-flip-streak.html'">
        Next Chapter →
      </button>
    </div>
  </div>

  <script>
    const quizOptions = document.querySelectorAll('.quiz-options');
    let answered = 0;
    let correct = 0;

    quizOptions.forEach(optionsDiv => {
      const options = optionsDiv.querySelectorAll('.quiz-option');
      options.forEach(option => {
        option.addEventListener('click', () => {
          options.forEach(o => o.classList.add('disabled'));

          if (option.dataset.answer === 'true') {
            option.classList.add('correct');
            correct++;
          } else {
            option.classList.add('incorrect');
            options.forEach(o => {
              if (o.dataset.answer === 'true') o.classList.add('correct');
            });
          }

          answered++;
          if (answered === 3) {
            document.getElementById('score').textContent = `${correct}/3`;
            document.getElementById('score-card').style.display = 'block';
          }
        });
      });
    });
  </script>
</body>
</html>
