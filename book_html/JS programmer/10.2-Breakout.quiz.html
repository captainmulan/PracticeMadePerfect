<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout - Quiz - JS Programmer</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;
      background:linear-gradient(180deg,#1e1b4b 0%,#4c1d95 100%);
      color:#1f2937;
      min-height:100vh;
    }
    .container{
      max-width:620px;
      margin:auto;
      padding:24px 16px 40px;
    }
    .header{
      text-align:center;
      margin-bottom:28px;
    }
    .logo{
      font-size:54px;
      margin-bottom:10px;
    }
    h1{
      font-size:30px;
      color:#fef08a;
      margin-bottom:8px;
    }
    .subtitle{
      color:#c4b5fd;
      font-size:18px;
    }
    .progress-wrap{
      background:rgba(255,255,255,.2);
      border-radius:999px;
      height:14px;
      margin-bottom:22px;
      overflow:hidden;
    }
    #progressBar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#fbbf24,#ec4899);
      transition:width .3s;
    }
    .card{
      background:#fff;
      border-radius:24px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 6px 20px rgba(0,0,0,.25);
    }
    .q-count{
      color:#7c3aed;
      font-weight:bold;
      font-size:15px;
      margin-bottom:8px;
    }
    .q-text{
      font-size:20px;
      line-height:1.6;
      margin-bottom:18px;
      font-weight:bold;
    }
    .choice{
      display:block;
      width:100%;
      text-align:left;
      background:#f5f3ff;
      border:3px solid transparent;
      border-radius:16px;
      padding:16px 18px;
      font-size:17px;
      margin-bottom:12px;
      cursor:pointer;
      font-family:inherit;
      color:#1f2937;
      transition:.15s;
    }
    .choice:hover{
      background:#ede9fe;
    }
    .choice.correct{
      background:#dcfce7;
      border-color:#16a34a;
    }
    .choice.wrong{
      background:#fee2e2;
      border-color:#dc2626;
    }
    .choice:disabled{
      cursor:default;
    }
    .feedback{
      font-size:17px;
      line-height:1.7;
      padding:16px;
      border-radius:14px;
      margin-top:10px;
      display:none;
    }
    .feedback.show{
      display:block;
    }
    .feedback.right-fb{
      background:#dcfce7;
      color:#166534;
    }
    .feedback.wrong-fb{
      background:#fee2e2;
      color:#991b1b;
    }
    button.nextBtn{
      width:100%;
      margin-top:18px;
      padding:16px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,#7c3aed,#ec4899);
      color:white;
      font-size:19px;
      font-weight:bold;
      cursor:pointer;
      display:none;
    }
    button.nextBtn.show{
      display:block;
    }
    .result{
      text-align:center;
    }
    .result .emoji{
      font-size:64px;
      margin-bottom:10px;
    }
    .result h2{
      color:#7c3aed;
      font-size:26px;
      margin-bottom:10px;
    }
    .result p{
      font-size:19px;
      margin-bottom:18px;
    }
    .retry-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,#7c3aed,#ec4899);
      color:white;
      font-size:19px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🧱🏓</div>
    <h1>Breakout Quiz</h1>
    <div class="subtitle">Chapter 10 · Collision Detection + Bounce + Game Physics</div>
  </div>

  <div class="progress-wrap">
    <div id="progressBar"></div>
  </div>

  <div class="card" id="quizCard"></div>
</div>

<script>
const questions = [
  {
    q: "What is 'collision detection' used for in Breakout?",
    choices: [
      "Choosing the color of each brick",
      "Checking if the ball's box overlaps a wall, the paddle, or a brick",
      "Counting how many times you clicked Start",
      "Deciding how fast the game loop runs"
    ],
    correct: 1,
    explain: "Collision detection compares the ball's box to other boxes (walls, paddle, bricks) to see if they overlap - that's how the game knows the ball touched something."
  },
  {
    q: "How does the ball 'bounce' off a wall in code?",
    choices: [
      "Its position resets to the center of the screen",
      "The velocity (vx or vy) is multiplied by -1",
      "The brick's color changes",
      "The score increases by 10"
    ],
    correct: 1,
    explain: "Multiplying velocity by -1 flips its direction - same speed, opposite way. That's exactly what a bounce is."
  },
  {
    q: "In Breakout, what usually happens when the ball hits a brick?",
    choices: [
      "The paddle disappears",
      "The ball stops moving completely",
      "The brick is marked as destroyed, the ball bounces, and score goes up",
      "The game restarts from question 1"
    ],
    correct: 2,
    explain: "A brick collision destroys that brick, flips the ball's vertical direction, and adds points - three reactions to one detected collision."
  },
  {
    q: "Why does hitting the paddle at different spots change the ball's bounce angle?",
    choices: [
      "It's random every time, with no pattern",
      "The paddle changes color depending on where it's hit",
      "The code calculates vx based on how far from the paddle's center the ball hit",
      "It doesn't - the angle is always the same"
    ],
    correct: 2,
    explain: "Many Breakout games set the ball's new vx using the hit position relative to the paddle's center, so hitting near an edge sends it off at a sharper angle."
  },
  {
    q: "What does the game loop do, over and over, many times per second?",
    choices: [
      "Reloads the entire web page",
      "Moves the ball, checks collisions, reacts, and redraws everything",
      "Waits for the player to click Start again",
      "Deletes all the bricks at once"
    ],
    correct: 1,
    explain: "The loop updates position, checks for collisions, reacts (bounce/score/remove brick), and redraws - then calls itself again with requestAnimationFrame."
  },
  {
    q: "If the ball falls below the paddle and off the bottom of the screen, what typically happens?",
    choices: [
      "The player loses a life and the ball resets",
      "The game speeds up permanently",
      "A new brick is added",
      "Nothing happens at all"
    ],
    correct: 0,
    explain: "Missing the ball with the paddle means it went out of bounds - the game detects that and takes away a life, then resets the ball to try again."
  }
];

let current = 0;
let scoreCount = 0;
const quizCard = document.getElementById("quizCard");
const progressBar = document.getElementById("progressBar");

function renderQuestion(){
  const item = questions[current];
  progressBar.style.width = (current / questions.length * 100) + "%";

  let html = `<div class="q-count">Question ${current + 1} of ${questions.length}</div>`;
  html += `<div class="q-text">${item.q}</div>`;
  item.choices.forEach((choice, i) => {
    html += `<button class="choice" data-i="${i}">${choice}</button>`;
  });
  html += `<div class="feedback" id="feedback"></div>`;
  html += `<button class="nextBtn" id="nextBtn">Next ➡</button>`;

  quizCard.innerHTML = html;

  const buttons = quizCard.querySelectorAll(".choice");
  buttons.forEach(btn => {
    btn.addEventListener("click", () => selectAnswer(btn, item, buttons));
  });
}

function selectAnswer(btn, item, buttons){
  const chosen = parseInt(btn.dataset.i);
  buttons.forEach(b => b.disabled = true);

  const feedback = document.getElementById("feedback");
  const nextBtn = document.getElementById("nextBtn");

  if (chosen === item.correct){
    btn.classList.add("correct");
    feedback.textContent = "✅ Correct! " + item.explain;
    feedback.className = "feedback show right-fb";
    scoreCount++;
  } else {
    btn.classList.add("wrong");
    buttons[item.correct].classList.add("correct");
    feedback.textContent = "❌ Not quite. " + item.explain;
    feedback.className = "feedback show wrong-fb";
  }

  nextBtn.classList.add("show");
  nextBtn.addEventListener("click", () => {
    current++;
    if (current < questions.length){
      renderQuestion();
    } else {
      showResult();
    }
  });
}

function showResult(){
  progressBar.style.width = "100%";
  const pct = Math.round((scoreCount / questions.length) * 100);
  let emoji = "🌱";
  let msg = "Keep practicing - collision and bounce take time to click!";
  if (pct >= 80){
    emoji = "🏆";
    msg = "Amazing! You really understand collision detection and bounce!";
  } else if (pct >= 50){
    emoji = "🎉";
    msg = "Nice work! You're getting the hang of game physics!";
  }

  quizCard.innerHTML = `
    <div class="result">
      <div class="emoji">${emoji}</div>
      <h2>You scored ${scoreCount} / ${questions.length}</h2>
      <p>${msg}</p>
      <button class="retry-btn" onclick="restart()">🔁 Try Again</button>
    </div>
  `;
}

function restart(){
  current = 0;
  scoreCount = 0;
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
